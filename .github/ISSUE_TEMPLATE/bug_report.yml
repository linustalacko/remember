name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce help a lot.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Remember version
      placeholder: "0.1.0 (or a commit hash if built from source)"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, or context. Don't paste sync tokens or secrets.
    validations:
      required: false
